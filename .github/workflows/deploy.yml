name: Deploy

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod' || 'dev') }}
  cancel-in-progress: false

jobs:
  resolve-env:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      tf_dir: ${{ steps.env.outputs.tf_dir }}
      github_environment: ${{ steps.env.outputs.github_environment }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV="prod"
          else
            ENV="dev"
          fi
          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "tf_dir=infra/environments/$ENV" >> "$GITHUB_OUTPUT"
          if [ "$ENV" = "prod" ]; then
            echo "github_environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "github_environment=development" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: resolve-env
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.github_environment }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
      TF_DIR: ${{ needs.resolve-env.outputs.tf_dir }}
      ENV_NAME: ${{ needs.resolve-env.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${ENV_NAME}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -auto-approve -input=false \
            -var="api_image_tag=${{ github.sha }}" \
            -var="github_repository=${{ github.repository }}"

      - name: Read Terraform outputs
        id: tf
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "ecr=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "bucket=$(terraform output -raw frontend_bucket)" >> "$GITHUB_OUTPUT"
          echo "cf_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "ecs_cluster=$(terraform output -raw ecs_cluster)" >> "$GITHUB_OUTPUT"
          echo "ecs_service=$(terraform output -raw ecs_service)" >> "$GITHUB_OUTPUT"
          echo "website=$(terraform output -raw website_url)" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="${{ steps.tf.outputs.ecr }}:${IMAGE_TAG}"
          docker build -t "$IMAGE" -t "${{ steps.tf.outputs.ecr }}:latest" .
          docker push "$IMAGE"
          docker push "${{ steps.tf.outputs.ecr }}:latest"

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster "${{ steps.tf.outputs.ecs_cluster }}" \
            --service "${{ steps.tf.outputs.ecs_service }}" \
            --force-new-deployment \
            --region "${{ env.AWS_REGION }}"

      - name: Install & build frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @workspace/frontend run build

      - name: Deploy frontend to S3
        run: |
          aws s3 sync artifacts/frontend/dist/public/ "s3://${{ steps.tf.outputs.bucket }}/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp artifacts/frontend/dist/public/index.html "s3://${{ steps.tf.outputs.bucket }}/index.html" \
            --cache-control "public,max-age=0,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf.outputs.cf_id }}" \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "## Déployé (${{ env.ENV_NAME }})" >> "$GITHUB_STEP_SUMMARY"
          echo "URL: ${{ steps.tf.outputs.website }}" >> "$GITHUB_STEP_SUMMARY"
