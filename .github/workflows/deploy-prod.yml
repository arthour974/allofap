# Déploiement PROD — branche main
# Déclenché après merge develop → main : la CI sur main doit réussir, puis ce workflow déploie.
# Secrets/variables : environnement GitHub "production"

name: Deploy PROD

on:
  # Push direct (fiable après merge develop → main)
  push:
    branches:
      - main
  # En secours : deploy après CI réussie sur main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  deploy:
    # Ne pas déployer sur échec CI ni sur CI d'une PR (seulement push main post-merge)
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push'
      )
    uses: ./.github/workflows/deploy-aws.yml
    with:
      env_name: prod
      github_environment: production
      git_ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || '' }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
