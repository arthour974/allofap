# Workflow réutilisable — ne pas lancer directement.
# Utiliser deploy-dev.yml ou deploy-prod.yml

name: Deploy AWS (reusable)

on:
  workflow_call:
    inputs:
      env_name:
        description: "dev ou prod (dossier Terraform + clé state S3)"
        required: true
        type: string
      github_environment:
        description: "Nom de l'environnement GitHub (development | production)"
        required: true
        type: string
    secrets:
      AWS_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ inputs.env_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.github_environment }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-3' }}
      TF_DIR: infra/environments/${{ inputs.env_name }}
      ENV_NAME: ${{ inputs.env_name }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${ENV_NAME}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Terraform apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform apply -auto-approve -input=false \
            -var="api_image_tag=${{ github.sha }}" \
            -var="github_repository=${{ github.repository }}" \
            -var="terraform_state_bucket=${{ vars.TF_STATE_BUCKET }}" \
            -var="terraform_lock_table=${{ vars.TF_LOCK_TABLE }}"

      - name: Read Terraform outputs
        id: tf
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "ecr=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"
          echo "bucket=$(terraform output -raw frontend_bucket)" >> "$GITHUB_OUTPUT"
          echo "cf_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"
          echo "ecs_cluster=$(terraform output -raw ecs_cluster)" >> "$GITHUB_OUTPUT"
          echo "ecs_service=$(terraform output -raw ecs_service)" >> "$GITHUB_OUTPUT"
          echo "website=$(terraform output -raw website_url)" >> "$GITHUB_OUTPUT"

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        run: |
          IMAGE="${{ steps.tf.outputs.ecr }}:${{ github.sha }}"
          docker build -t "$IMAGE" -t "${{ steps.tf.outputs.ecr }}:latest" .
          docker push "$IMAGE"
          docker push "${{ steps.tf.outputs.ecr }}:latest"

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster "${{ steps.tf.outputs.ecs_cluster }}" \
            --service "${{ steps.tf.outputs.ecs_service }}" \
            --force-new-deployment \
            --region "${{ env.AWS_REGION }}"

      - name: Install & build frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @workspace/frontend run build

      - name: Deploy frontend to S3
        run: |
          aws s3 sync artifacts/frontend/dist/public/ "s3://${{ steps.tf.outputs.bucket }}/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          aws s3 cp artifacts/frontend/dist/public/index.html "s3://${{ steps.tf.outputs.bucket }}/index.html" \
            --cache-control "public,max-age=0,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf.outputs.cf_id }}" \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "## Déployé : ${{ inputs.env_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Environnement GitHub : **${{ inputs.github_environment }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "URL : ${{ steps.tf.outputs.website }}" >> "$GITHUB_STEP_SUMMARY"
