kind = "web"
previewPath = "/"
title = "FAP Expert"
version = "1.0.0"
id = "artifacts/fap-expert"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22661

[services.development]
run = "pnpm --filter @workspace/fap-expert run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fap-expert", "run", "build" ]
publicDir = "artifacts/fap-expert/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22661"
BASE_PATH = "/"
